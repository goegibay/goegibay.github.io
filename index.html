<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BetterMe Lab</title>
<style>
  :root { color-scheme: light dark; }
  * { margin: 0; box-sizing: border-box; }
  body {
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 1.5rem; padding: 2rem;
    font-family: -apple-system, "Segoe UI", Roboto, "Noto Sans TC", sans-serif;
    background: linear-gradient(135deg, #0B0F19, #151029 52%, #26153F);
    color: #F5F7FA; text-align: center;
  }
  h1 { font-size: 2rem; letter-spacing: 1px; }
  h1 .ch { color: #2DD4BF; } h1 .ain { color: #C7CDD9; }
  p { color: #A7B0C0; max-width: 34rem; line-height: 1.6; }
  .apps { display: flex; flex-direction: column; gap: .75rem; margin-top: .5rem; }
  a.app {
    color: #F5F7FA; text-decoration: none; padding: .75rem 1.5rem;
    border: 1px solid rgba(255,255,255,.15); border-radius: 999px;
    background: rgba(255,255,255,.04); transition: background .2s;
  }
  a.app:hover { background: rgba(45,212,191,.15); }
  footer { margin-top: 1rem; font-size: .85rem; }
  footer a { color: #2DD4BF; }
</style>
</head>
<body>
  <h1>Better<span class="ch">Me</span> <span class="ain">Lab</span></h1>
  <p>We build calm, privacy-first mobile apps that help you change your habits — without judging you for a single stumble.</p>
  <div class="apps">
    <a class="app" href="https://play.google.com/store/apps/details?id=com.unchain.app">UNCHAIN — Break Bad Habits (Google Play)</a>
  </div>
  <footer>Contact: <a href="mailto:stevenhuang42195@gmail.com">stevenhuang42195@gmail.com</a></footer>
</body>
</html>
